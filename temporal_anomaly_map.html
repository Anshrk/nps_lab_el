              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#00ffcc", "font": {"color": "#ffffff"}, "group": "internal", "id": "Subnet_Alpha", "label": "Subnet_Alpha", "shape": "square", "size": 20}, {"color": "#00ffcc", "font": {"color": "#ffffff"}, "group": "internal", "id": "Core_Switch_01", "label": "Core_Switch_01", "shape": "square", "size": 20}, {"color": "#00ffcc", "font": {"color": "#ffffff"}, "group": "internal", "id": "Web_Server_Node", "label": "Web_Server_Node", "shape": "square", "size": 20}, {"color": "#ff9900", "font": {"color": "#ffffff"}, "group": "external", "id": "External_Unmapped_IP", "label": "External_Unmapped_IP", "shape": "triangle", "size": 25}, {"color": "#00ffcc", "font": {"color": "#ffffff"}, "group": "internal", "id": "Backup_Database", "label": "Backup_Database", "shape": "square", "size": 20}]);
                  edges = new vis.DataSet([{"arrows": "arrow", "color": "#445566", "from": "Subnet_Alpha", "title": "Relation: ROUTES_TRAFFIC_TO\nTimestamp: 11:42:25", "to": "Core_Switch_01", "width": 1}, {"arrows": "arrow", "color": "#445566", "from": "Core_Switch_01", "title": "Relation: POLLS_STATUS\nTimestamp: 11:42:25", "to": "Web_Server_Node", "width": 1}, {"arrows": "arrow", "color": "#ff3355", "from": "Core_Switch_01", "title": "Relation: REQUESTS_REVERSE_TUNNEL\nTimestamp: 12:02:25", "to": "External_Unmapped_IP", "width": 1}, {"arrows": "arrow", "color": "#445566", "from": "Web_Server_Node", "title": "Relation: REPLICATES_TO\nTimestamp: 11:42:25", "to": "Backup_Database", "width": 1}, {"arrows": "arrow", "color": "#ff3355", "from": "External_Unmapped_IP", "title": "Relation: PROBES_BOUNDARIES\nTimestamp: 11:52:25", "to": "Web_Server_Node", "width": 1}]);

                  nodeColors = {};

                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"barnesHut": {"gravitationalConstant": -4000, "centralGravity": 0.15, "springLength": 150}, "solver": "barnesHut"}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  
                    network.on("selectNode", neighbourhoodHighlight);
                  

                  


                  

                  return network;

              }
